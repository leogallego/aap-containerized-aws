---
# Provision Let's Encrypt SSL certificates on any host
# Works on fresh VMs and running AAP instances alike
#
# Usage:
#   source env-vars.sh
#   ansible-playbook -i inventory/<instance-name>-hosts.yml playbooks/provision-letsencrypt.yml -e @extra-vars.yml
#
# Required variables:
#   - installer_fqdn_hostname: domain name for the certificate
#   - letsencrypt_email: email for Let's Encrypt notifications
#
# Optional variables:
#   - route53_hosted_zone_id: if set, uses DNS-01 challenge (recommended)
#     if empty, uses HTTP-01 standalone challenge

- name: Provision Let's Encrypt SSL certificates
  hosts: all
  gather_facts: true

  tasks:
    - name: Validate Let's Encrypt configuration
      ansible.builtin.assert:
        that:
          - letsencrypt_email | default('') | length > 0
        fail_msg: >-
          LETSENCRYPT_EMAIL must be set.
          Set it in your env-vars.sh file.

    - name: Validate FQDN is not the default placeholder
      ansible.builtin.assert:
        that:
          - installer_fqdn_hostname | default('') | length > 0
          - installer_fqdn_hostname != 'aap.example.org'
        fail_msg: >-
          INSTALLER_FQDN_HOSTNAME must be set to a real domain.

    - name: Determine challenge method
      ansible.builtin.set_fact:
        __letsencrypt_method: >-
          {{ 'dns' if (route53_hosted_zone_id | default('') | length > 0)
             else 'http' }}

    - name: Display certificate provisioning plan
      ansible.builtin.debug:
        msg: >-
          Provisioning Let's Encrypt certificate for {{ installer_fqdn_hostname }}
          using {{ __letsencrypt_method | upper }} challenge method.
        verbosity: 1

    # --- Install certbot ---

    - name: Install certbot
      ansible.builtin.pip:
        name:
          - certbot
        state: present
      become: true

    - name: Install certbot Route53 DNS plugin
      ansible.builtin.pip:
        name:
          - certbot-dns-route53
        state: present
      become: true
      when: __letsencrypt_method == 'dns'

    # --- Obtain certificate ---

    - name: Check if certificate already exists
      ansible.builtin.stat:
        path: "/etc/letsencrypt/live/{{ installer_fqdn_hostname }}/fullchain.pem"
      register: __existing_cert
      become: true

    - name: Request certificate via DNS challenge (Route53)
      ansible.builtin.command: >-
        certbot certonly
        --dns-route53
        --non-interactive
        --agree-tos
        --email {{ letsencrypt_email }}
        -d {{ installer_fqdn_hostname }}
      become: true
      register: __certbot_dns_result
      changed_when: "'Certificate not yet due for renewal' not in __certbot_dns_result.stdout"
      when:
        - __letsencrypt_method == 'dns'
        - not __existing_cert.stat.exists

    - name: Check if port 80 is in use
      ansible.builtin.command: ss -tlnp sport = :80
      become: true
      register: __port80_check
      changed_when: false
      when: __letsencrypt_method == 'http'

    - name: Identify process on port 80
      ansible.builtin.set_fact:
        __port80_busy: "{{ 'LISTEN' in (__port80_check.stdout | default('')) }}"
      when: __letsencrypt_method == 'http'

    - name: Set pre/post hooks to free port 80 during challenge
      ansible.builtin.set_fact:
        __certbot_pre_hook: >-
          --pre-hook "runuser -l {{ ansible_user }} -c 'systemctl --user stop automation-gateway-proxy'"
        __certbot_post_hook: >-
          --post-hook "runuser -l {{ ansible_user }} -c 'systemctl --user start automation-gateway-proxy'"
      when:
        - __letsencrypt_method == 'http'
        - __port80_busy | default(false) | bool

    - name: Request certificate via HTTP challenge (standalone)
      ansible.builtin.command: >-
        certbot certonly
        --standalone
        --non-interactive
        --agree-tos
        --email {{ letsencrypt_email }}
        -d {{ installer_fqdn_hostname }}
        {{ __certbot_pre_hook | default('') }}
        {{ __certbot_post_hook | default('') }}
      become: true
      register: __certbot_http_result
      changed_when: "'Certificate not yet due for renewal' not in __certbot_http_result.stdout"
      when:
        - __letsencrypt_method == 'http'
        - not __existing_cert.stat.exists

    - name: Verify certificate was obtained
      ansible.builtin.stat:
        path: "/etc/letsencrypt/live/{{ installer_fqdn_hostname }}/fullchain.pem"
      register: __cert_check
      become: true

    - name: Fail if certificate was not obtained
      ansible.builtin.fail:
        msg: >-
          Let's Encrypt certificate was not obtained for {{ installer_fqdn_hostname }}.
          Check certbot logs at /var/log/letsencrypt/letsencrypt.log for details.
      when: not __cert_check.stat.exists

    # --- Auto-detect AAP and deploy certs ---

    - name: Check if AAP gateway directory exists
      ansible.builtin.stat:
        path: "/home/{{ ansible_user }}/aap/gateway/etc"
      register: __aap_gateway_dir

    - name: Deploy certificates to AAP gateway
      when: __aap_gateway_dir.stat.exists | default(false)
      become: true
      block:
        - name: Install certificate to AAP gateway
          ansible.builtin.command: >-
            install -o {{ ansible_user }} -g {{ ansible_user }} -m {{ item.mode }}
            {{ item.src }} {{ item.dest }}
          loop:
            - src: "/etc/letsencrypt/live/{{ installer_fqdn_hostname }}/fullchain.pem"
              dest: "/home/{{ ansible_user }}/aap/gateway/etc/gateway.cert"
              mode: "0644"
            - src: "/etc/letsencrypt/live/{{ installer_fqdn_hostname }}/privkey.pem"
              dest: "/home/{{ ansible_user }}/aap/gateway/etc/gateway.key"
              mode: "0600"
          changed_when: true

        - name: Restart AAP gateway proxy
          ansible.builtin.command: >-
            runuser -l {{ ansible_user }} -c 'systemctl --user restart automation-gateway-proxy'
          changed_when: true

    - name: Check if MCP server directory exists
      ansible.builtin.stat:
        path: "/home/{{ ansible_user }}/aap/mcp/etc"
      register: __mcp_dir

    - name: Deploy certificates to MCP server
      when: __mcp_dir.stat.exists | default(false)
      become: true
      block:
        - name: Install certificate to MCP server
          ansible.builtin.command: >-
            install -o {{ ansible_user }} -g {{ ansible_user }} -m {{ item.mode }}
            {{ item.src }} {{ item.dest }}
          loop:
            - src: "/etc/letsencrypt/live/{{ installer_fqdn_hostname }}/fullchain.pem"
              dest: "/home/{{ ansible_user }}/aap/mcp/etc/mcp.cert"
              mode: "0644"
            - src: "/etc/letsencrypt/live/{{ installer_fqdn_hostname }}/privkey.pem"
              dest: "/home/{{ ansible_user }}/aap/mcp/etc/mcp.key"
              mode: "0600"
          changed_when: true

        - name: Restart MCP server
          ansible.builtin.command: >-
            runuser -l {{ ansible_user }} -c 'systemctl --user restart mcp'
          changed_when: true

    # --- Renewal hook and cron ---

    - name: Create certbot renewal hooks directory
      ansible.builtin.file:
        path: /etc/letsencrypt/renewal-hooks/deploy
        state: directory
        mode: '0755'
      become: true

    - name: Deploy AAP certificate renewal hook
      ansible.builtin.template:
        src: >-
          {{ project_root | default(playbook_dir + '/..') }}/playbooks/aap/templates/aap-cert-deploy.sh.j2
        dest: /etc/letsencrypt/renewal-hooks/deploy/aap-cert-deploy.sh
        mode: '0755'
        backup: true
      become: true
      when: __aap_gateway_dir.stat.exists | default(false)

    - name: Set up certbot auto-renewal cron job
      ansible.builtin.cron:
        name: "certbot-renew"
        minute: "30"
        hour: "2,14"
        job: "certbot renew --quiet"
        user: root
      become: true

    - name: Display certificate provisioning result
      ansible.builtin.debug:
        msg:
          - "Let's Encrypt certificate provisioned for {{ installer_fqdn_hostname }}"
          - "Cert: /etc/letsencrypt/live/{{ installer_fqdn_hostname }}/fullchain.pem"
          - "Key: /etc/letsencrypt/live/{{ installer_fqdn_hostname }}/privkey.pem"
          - "AAP gateway: {{ 'deployed' if __aap_gateway_dir.stat.exists | default(false) else 'not found, skipped' }}"
          - "MCP server: {{ 'deployed' if __mcp_dir.stat.exists | default(false) else 'not found, skipped' }}"
          - "Auto-renewal: cron at 2:30 and 14:30 daily"
        verbosity: 1
