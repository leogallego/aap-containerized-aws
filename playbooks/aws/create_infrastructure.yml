---
- name: Create AWS Infrastructure for AAP Containerized Installation
  hosts: localhost
  gather_facts: false
  vars_files:
    - "{{ project_root | default(playbook_dir + '/../..') }}/extra-vars.yml"

  vars:
    key_path: "{{ project_root | default(playbook_dir + '/../..') }}/files/{{ instance_name }}-key.pem"
    instance_info_path: "{{ project_root | default(playbook_dir + '/../..') }}/files/{{ instance_name }}-info.txt"
    inventory_path: "{{ project_root | default(playbook_dir + '/../..') }}/inventory/{{ instance_name }}-hosts.yml"

  tasks:
    - name: Set Route53 integration flag
      ansible.builtin.set_fact:
        __use_route53: >-
          {{ route53_hosted_zone_id | default('') | length > 0
             and enable_letsencrypt | default(false) | bool }}

    - name: Create VPC
      amazon.aws.ec2_vpc_net:
        name: "{{ instance_name }}-vpc"
        cidr_block: "{{ vpc_cidr }}"
        region: "{{ aws_region }}"
        tags: "{{ common_tags | combine({'Name': instance_name + '-vpc'}) }}"
        tenancy: default
      register: vpc

    - name: Create Internet Gateway
      amazon.aws.ec2_vpc_igw:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ aws_region }}"
        tags: "{{ common_tags | combine({'Name': instance_name + '-igw'}) }}"
      register: igw

    - name: Create public subnet
      amazon.aws.ec2_vpc_subnet:
        state: present
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "{{ subnet_cidr }}"
        region: "{{ aws_region }}"
        az: "{{ aws_availability_zone }}"
        map_public: true
        tags: "{{ common_tags | combine({'Name': instance_name + '-subnet'}) }}"
      register: subnet

    - name: Create route table
      amazon.aws.ec2_vpc_route_table:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ aws_region }}"
        tags: "{{ common_tags | combine({'Name': instance_name + '-route-table'}) }}"
        subnets:
          - "{{ subnet.subnet.id }}"
        routes:
          - dest: 0.0.0.0/0
            gateway_id: "{{ igw.gateway_id }}"
      register: route_table

    - name: Create security group
      amazon.aws.ec2_security_group:
        name: "{{ instance_name }}-sg"
        description: "Security group for AAP containerized setup"
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ aws_region }}"
        tags: "{{ common_tags | combine({'Name': instance_name + '-sg'}) }}"
        rules:
          - proto: tcp
            ports:
              - 22
            cidr_ip: 0.0.0.0/0
            rule_desc: "Allow SSH"
          - proto: tcp
            ports:
              - 80
              - 443
            cidr_ip: 0.0.0.0/0
            rule_desc: "Allow HTTP/HTTPS"
          - proto: tcp
            ports:
              - 27826
            cidr_ip: 0.0.0.0/0
            rule_desc: "Allow AAP Gateway"
          - proto: tcp
            ports:
              - 8444
            cidr_ip: 0.0.0.0/0
            rule_desc: "Allow SSL proxy (nginx with LetsEncrypt)"
          - proto: tcp
            ports:
              - 8448
            cidr_ip: 0.0.0.0/0
            rule_desc: "Allow MCP Server"
        rules_egress:
          - proto: all
            cidr_ip: 0.0.0.0/0
      register: security_group

    - name: Create EC2 key pair
      amazon.aws.ec2_key:
        name: "{{ instance_name }}-key"
        region: "{{ aws_region }}"
      register: key_pair
      notify: Save private key

    - name: Create IAM role for certbot Route53 access
      amazon.aws.iam_role:
        name: "{{ instance_name }}-certbot-route53"
        assume_role_policy_document:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Principal:
                Service: ec2.amazonaws.com
              Action: sts:AssumeRole
        create_instance_profile: true
        tags: "{{ common_tags | combine({'Name': instance_name + '-certbot-route53'}) }}"
        state: present
      register: certbot_iam_role
      when: __use_route53 | bool

    - name: Attach Route53 policy to certbot role
      amazon.aws.iam_policy:
        iam_type: role
        iam_name: "{{ instance_name }}-certbot-route53"
        policy_name: "{{ instance_name }}-certbot-route53-policy"
        policy_json:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - route53:ListHostedZones
                - route53:GetChange
              Resource: "*"
            - Effect: Allow
              Action:
                - route53:ChangeResourceRecordSets
              Resource: >-
                arn:aws:route53:::hostedzone/{{ route53_hosted_zone_id }}
        state: present
      when: __use_route53 | bool

    - name: Wait for IAM instance profile propagation
      ansible.builtin.pause:
        seconds: 15
      when: __use_route53 | bool and certbot_iam_role is changed

    - name: Launch EC2 instance
      amazon.aws.ec2_instance:
        name: "{{ instance_name }}"
        key_name: "{{ instance_name }}-key"
        vpc_subnet_id: "{{ subnet.subnet.id }}"
        instance_type: "{{ instance_type }}"
        network_interfaces:
          - assign_public_ip: true
            subnet_id: "{{ subnet.subnet.id }}"
            groups:
              - "{{ security_group.group_id }}"
        image_id: "{{ ami_id }}"
        region: "{{ aws_region }}"
        tags: "{{ common_tags | combine({'Name': instance_name}) }}"
        volumes:
          - device_name: /dev/sda1
            ebs:
              volume_size: "{{ volume_size }}"
              delete_on_termination: true
        instance_role: "{{ (instance_name + '-certbot-route53') if (__use_route53 | bool) else omit }}"
        wait: true
        wait_timeout: 600
      register: ec2

    - name: Debug EC2 instance structure
      ansible.builtin.debug:
        var: ec2
      when: ec2 is defined

    - name: Set instance facts safely
      ansible.builtin.set_fact:
        instance_id: "{{ ec2.instances[0].instance_id }}"
        public_ip: "{{ ec2.instances[0].network_interfaces[0].association.public_ip | default(ec2.instances[0].public_ip_address) | default('') }}"
        private_ip: "{{ ec2.instances[0].private_ip_address | default(ec2.instances[0].network_interfaces[0].private_ip_address) }}"
        public_dns: "{{ ec2.instances[0].public_dns_name | default(ec2.instances[0].network_interfaces[0].association.public_dns_name) | default('') }}"

    - name: Wait for public IP to be assigned (if needed)
      amazon.aws.ec2_instance_info:
        instance_ids:
          - "{{ instance_id }}"
        region: "{{ aws_region }}"
      register: instance_info
      until: instance_info.instances[0].network_interfaces[0].association.public_ip is defined
      retries: 30
      delay: 10
      when: public_ip == ''

    - name: Update public IP from instance info if needed
      ansible.builtin.set_fact:
        public_ip: "{{ instance_info.instances[0].network_interfaces[0].association.public_ip }}"
        public_dns: "{{ instance_info.instances[0].network_interfaces[0].association.public_dns_name | default('') }}"
      when: public_ip == '' and instance_info is defined

    - name: Create Route53 DNS A record for AAP instance
      amazon.aws.route53:
        state: present
        zone: "{{ route53_hosted_zone_id }}"
        record: "{{ installer_fqdn_hostname }}"
        type: A
        ttl: 300
        value:
          - "{{ public_ip }}"
        overwrite: true
      when: __use_route53 | bool

    - name: Display Route53 DNS record info
      ansible.builtin.debug:
        msg: >-
          Route53 A record created: {{ installer_fqdn_hostname }} -> {{ public_ip }}.
          DNS propagation may take up to 60 seconds.
        verbosity: 1
      when: __use_route53 | bool

    - name: Wait for SSH to become available
      ansible.builtin.wait_for:
        host: "{{ public_ip }}"
        port: 22
        delay: 10
        timeout: 300

    - name: Add instance to runtime inventory as aap_nodes
      ansible.builtin.add_host:
        name: "{{ public_ip }}"
        groups: aap_nodes
        ansible_host: "{{ public_ip }}"
        ansible_user: ec2-user
        ansible_ssh_private_key_file: "{{ key_path }}"
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o IdentitiesOnly=yes'

    - name: Save instance information
      ansible.builtin.copy:
        content: |
          Instance ID: {{ instance_id }}
          Public IP: {{ public_ip }}
          Private IP: {{ private_ip }}
          Public DNS: {{ public_dns }}
          Key Path: {{ key_path }}
          Installer FQDN: {{ installer_fqdn_hostname }}
        dest: "{{ instance_info_path }}"
        mode: '0644'

    - name: Create inventory directory if it doesn't exist
      ansible.builtin.file:
        path: "{{ project_root | default(playbook_dir + '/../..') }}/inventory"
        state: directory
        mode: '0755'

    - name: Create inventory file for AAP installation
      ansible.builtin.copy:
        content: |
          ---
          all:
            children:
              aap_nodes:
                hosts:
                  aap_controller:
                    ansible_host: {{ public_ip }}
                    ansible_user: ec2-user
                    ansible_ssh_private_key_file: {{ key_path }}
                    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o IdentitiesOnly=yes'
        dest: "{{ inventory_path }}"
        mode: '0644'

    - name: Display connection information
      ansible.builtin.debug:
        msg: |
          AWS Infrastructure created successfully!

          Instance Details:
          - Instance ID: {{ instance_id }}
          - Public IP: {{ public_ip }}
          - SSH Command: ssh -i {{ key_path }} ec2-user@{{ public_ip }}

          Next Steps:
          1. Run the AAP installation: ansible-playbook -i {{ inventory_path }} playbooks/aap/install.yml
          2. Access AAP at: https://{{ public_ip }}

  handlers:
    - name: Save private key
      ansible.builtin.copy:
        content: "{{ key_pair.key.private_key }}"
        dest: "{{ key_path }}"
        mode: '0600'
      when: key_pair.key.private_key is defined
