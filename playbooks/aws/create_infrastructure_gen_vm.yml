---
- name: Create AWS Infrastructure for Generic RHEL VM
  hosts: localhost
  gather_facts: false

  vars:
    # Random hash for unique default names (6 hex chars)
    # Override gen_instance_name to pin a specific VM and make runs idempotent
    __gen_hash: "{{ lookup('password', '/dev/null chars=hexdigits length=6') | lower }}"

    # Instance name is the idempotency key:
    #   - Default includes a random hash so each run creates a new VM
    #   - Set INSTANCE_NAME or -e gen_instance_name=myvm to target an existing VM
    gen_instance_name: >-
      {{ lookup('env', 'INSTANCE_NAME') | default('rhel-vm-' + __gen_hash, true) }}
    gen_instance_type: >-
      {{ lookup('env', 'AWS_INSTANCE_TYPE') | default('t3.small', true) }}
    gen_volume_size: >-
      {{ lookup('env', 'AWS_VOLUME_SIZE') | default('20', true) }}
    # RHEL 9.4+ in us-east-1
    gen_ami_id: >-
      {{ lookup('env', 'AWS_AMI_ID') | default('ami-0d85f16af633ab171', true) }}

    # Region and network
    gen_aws_region: >-
      {{ lookup('env', 'AWS_REGION') | default('us-east-1', true) }}
    gen_aws_availability_zone: >-
      {{ lookup('env', 'AWS_AZ') | default('us-east-1a', true) }}
    gen_vpc_cidr: >-
      {{ lookup('env', 'VPC_CIDR') | default('10.0.0.0/16', true) }}
    gen_subnet_cidr: >-
      {{ lookup('env', 'SUBNET_CIDR') | default('10.0.1.0/24', true) }}

    # Tags
    gen_owner: >-
      {{ lookup('env', 'OWNER') | default('demo-user', true) }}
    gen_env: >-
      {{ lookup('env', 'ENVIRONMENT') | default('dev', true) }}
    gen_project: >-
      {{ lookup('env', 'PROJECT') | default('generic-rhel', true) }}
    gen_common_tags:
      owner: "{{ gen_owner }}"
      Environment: "{{ gen_env }}"
      Project: "{{ gen_project }}"
      ManagedBy: "Ansible"

    # Security group - additional TCP ports to open (beyond SSH, HTTP, HTTPS)
    gen_extra_sg_ports: >-
      {{ (lookup('env', 'EXTRA_SG_PORTS') | default('', true)).split(',') |
         select | map('int') | list }}

    # Computed paths (all derived from gen_instance_name)
    key_path: "{{ project_root | default(playbook_dir + '/../..') }}/files/{{ gen_instance_name }}-key.pem"
    instance_info_path: "{{ project_root | default(playbook_dir + '/../..') }}/files/{{ gen_instance_name }}-info.txt"
    inventory_path: "{{ project_root | default(playbook_dir + '/../..') }}/inventory/{{ gen_instance_name }}-hosts.yml"

    # Inventory group and host names (derived from instance name for uniqueness)
    gen_inventory_group: >-
      {{ lookup('env', 'INVENTORY_GROUP') | default('rhel_nodes', true) }}
    gen_inventory_host: >-
      {{ lookup('env', 'INVENTORY_HOST') | default(gen_instance_name | regex_replace('-', '_'), true) }}

  tasks:
    - name: Display instance name being used
      ansible.builtin.debug:
        msg: >-
          Instance name: {{ gen_instance_name }}
          (set INSTANCE_NAME or -e gen_instance_name=<name> to reuse an existing VM)

    - name: Create VPC
      amazon.aws.ec2_vpc_net:
        name: "{{ gen_instance_name }}-vpc"
        cidr_block: "{{ gen_vpc_cidr }}"
        region: "{{ gen_aws_region }}"
        tags: "{{ gen_common_tags | combine({'Name': gen_instance_name + '-vpc'}) }}"
        tenancy: default
      register: vpc

    - name: Create Internet Gateway
      amazon.aws.ec2_vpc_igw:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ gen_aws_region }}"
        tags: "{{ gen_common_tags | combine({'Name': gen_instance_name + '-igw'}) }}"
      register: igw

    - name: Create public subnet
      amazon.aws.ec2_vpc_subnet:
        state: present
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "{{ gen_subnet_cidr }}"
        region: "{{ gen_aws_region }}"
        az: "{{ gen_aws_availability_zone }}"
        map_public: true
        tags: "{{ gen_common_tags | combine({'Name': gen_instance_name + '-subnet'}) }}"
      register: subnet

    - name: Create route table
      amazon.aws.ec2_vpc_route_table:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ gen_aws_region }}"
        tags: "{{ gen_common_tags | combine({'Name': gen_instance_name + '-route-table'}) }}"
        subnets:
          - "{{ subnet.subnet.id }}"
        routes:
          - dest: 0.0.0.0/0
            gateway_id: "{{ igw.gateway_id }}"
      register: route_table

    - name: Build security group rules
      ansible.builtin.set_fact:
        __gen_sg_rules: >-
          {{
            [
              {'proto': 'tcp', 'ports': [22], 'cidr_ip': '0.0.0.0/0', 'rule_desc': 'Allow SSH'},
              {'proto': 'tcp', 'ports': [80, 443], 'cidr_ip': '0.0.0.0/0', 'rule_desc': 'Allow HTTP/HTTPS'}
            ]
            + (
              [{'proto': 'tcp', 'ports': gen_extra_sg_ports, 'cidr_ip': '0.0.0.0/0', 'rule_desc': 'Allow extra ports'}]
              if gen_extra_sg_ports | length > 0
              else []
            )
          }}

    - name: Create security group
      amazon.aws.ec2_security_group:
        name: "{{ gen_instance_name }}-sg"
        description: "Security group for {{ gen_instance_name }}"
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ gen_aws_region }}"
        tags: "{{ gen_common_tags | combine({'Name': gen_instance_name + '-sg'}) }}"
        rules: "{{ __gen_sg_rules }}"
        rules_egress:
          - proto: all
            cidr_ip: 0.0.0.0/0
      register: security_group

    - name: Create EC2 key pair
      amazon.aws.ec2_key:
        name: "{{ gen_instance_name }}-key"
        region: "{{ gen_aws_region }}"
      register: key_pair
      notify: Save private key

    - name: Launch EC2 instance
      amazon.aws.ec2_instance:
        name: "{{ gen_instance_name }}"
        key_name: "{{ gen_instance_name }}-key"
        vpc_subnet_id: "{{ subnet.subnet.id }}"
        instance_type: "{{ gen_instance_type }}"
        network_interfaces:
          - assign_public_ip: true
            subnet_id: "{{ subnet.subnet.id }}"
            groups:
              - "{{ security_group.group_id }}"
        image_id: "{{ gen_ami_id }}"
        region: "{{ gen_aws_region }}"
        tags: "{{ gen_common_tags | combine({'Name': gen_instance_name}) }}"
        volumes:
          - device_name: /dev/sda1
            ebs:
              volume_size: "{{ gen_volume_size }}"
              delete_on_termination: true
        wait: true
        wait_timeout: 600
      register: ec2

    - name: Debug EC2 instance structure
      ansible.builtin.debug:
        var: ec2
        verbosity: 1

    - name: Set instance facts safely
      ansible.builtin.set_fact:
        instance_id: "{{ ec2.instances[0].instance_id }}"
        public_ip: >-
          {{ ec2.instances[0].network_interfaces[0].association.public_ip |
             default(ec2.instances[0].public_ip_address) | default('') }}
        private_ip: >-
          {{ ec2.instances[0].private_ip_address |
             default(ec2.instances[0].network_interfaces[0].private_ip_address) }}
        public_dns: >-
          {{ ec2.instances[0].public_dns_name |
             default(ec2.instances[0].network_interfaces[0].association.public_dns_name) |
             default('') }}

    - name: Wait for public IP to be assigned (if needed)
      amazon.aws.ec2_instance_info:
        instance_ids:
          - "{{ instance_id }}"
        region: "{{ gen_aws_region }}"
      register: instance_info
      until: instance_info.instances[0].network_interfaces[0].association.public_ip is defined
      retries: 30
      delay: 10
      when: public_ip == ''

    - name: Update public IP from instance info if needed
      ansible.builtin.set_fact:
        public_ip: "{{ instance_info.instances[0].network_interfaces[0].association.public_ip }}"
        public_dns: >-
          {{ instance_info.instances[0].network_interfaces[0].association.public_dns_name |
             default('') }}
      when: public_ip == '' and instance_info is defined

    - name: Wait for SSH to become available
      ansible.builtin.wait_for:
        host: "{{ public_ip }}"
        port: 22
        delay: 10
        timeout: 300

    - name: Add instance to runtime inventory
      ansible.builtin.add_host:
        name: "{{ public_ip }}"
        groups: "{{ gen_inventory_group }}"
        ansible_host: "{{ public_ip }}"
        ansible_user: ec2-user
        ansible_ssh_private_key_file: "{{ key_path }}"
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o IdentitiesOnly=yes'

    - name: Save instance information
      ansible.builtin.copy:
        content: |
          Instance ID: {{ instance_id }}
          Public IP: {{ public_ip }}
          Private IP: {{ private_ip }}
          Public DNS: {{ public_dns }}
          Key Path: {{ key_path }}
        dest: "{{ instance_info_path }}"
        mode: '0644'

    - name: Create inventory directory if it doesn't exist
      ansible.builtin.file:
        path: "{{ project_root | default(playbook_dir + '/../..') }}/inventory"
        state: directory
        mode: '0755'

    - name: Create inventory file
      ansible.builtin.copy:
        content: |
          ---
          all:
            children:
              {{ gen_inventory_group }}:
                hosts:
                  {{ gen_inventory_host }}:
                    ansible_host: {{ public_ip }}
                    ansible_user: ec2-user
                    ansible_ssh_private_key_file: {{ key_path }}
                    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o IdentitiesOnly=yes'
        dest: "{{ inventory_path }}"
        mode: '0644'

    - name: Display connection information
      ansible.builtin.debug:
        msg: |
          AWS Infrastructure created successfully!

          Instance Details:
          - Instance ID: {{ instance_id }}
          - Public IP: {{ public_ip }}
          - SSH Command: ssh -i {{ key_path }} ec2-user@{{ public_ip }}

          Inventory written to: {{ inventory_path }}

  handlers:
    - name: Save private key
      ansible.builtin.copy:
        content: "{{ key_pair.key.private_key }}"
        dest: "{{ key_path }}"
        mode: '0600'
      when: key_pair.key.private_key is defined
