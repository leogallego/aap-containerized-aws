---
# Deploy certificates to running AAP services
# Included from main.yml when letsencrypt_deploy_to_aap is true

- name: deploy | Check if AAP gateway directory exists
  ansible.builtin.stat:
    path: "/home/{{ letsencrypt_aap_user }}/aap/gateway/etc"
  register: __letsencrypt_gateway_dir

- name: deploy | Deploy certificates to AAP gateway
  when: __letsencrypt_gateway_dir.stat.exists | default(false)
  become: true
  block:
    - name: deploy | Install certificate to AAP gateway
      ansible.builtin.command: >-
        install -o {{ letsencrypt_aap_user }} -g {{ letsencrypt_aap_user }}
        -m {{ item.mode }}
        {{ item.src }} {{ item.dest }}
      loop:
        - src: "{{ letsencrypt_cert_dir }}/{{ letsencrypt_domain }}/fullchain.pem"
          dest: "/home/{{ letsencrypt_aap_user }}/aap/gateway/etc/gateway.cert"
          mode: "0644"
        - src: "{{ letsencrypt_cert_dir }}/{{ letsencrypt_domain }}/privkey.pem"
          dest: "/home/{{ letsencrypt_aap_user }}/aap/gateway/etc/gateway.key"
          mode: "0600"
      changed_when: true

    - name: deploy | Restart AAP gateway proxy
      ansible.builtin.command: >-
        runuser -l {{ letsencrypt_aap_user }}
        -c 'XDG_RUNTIME_DIR=/run/user/$(id -u) systemctl --user restart automation-gateway-proxy'
      changed_when: true

- name: deploy | Check if MCP server directory exists
  ansible.builtin.stat:
    path: "/home/{{ letsencrypt_aap_user }}/aap/mcp/etc"
  register: __letsencrypt_mcp_dir
  when: letsencrypt_include_mcp | bool

- name: deploy | Deploy certificates to MCP server
  when:
    - letsencrypt_include_mcp | bool
    - __letsencrypt_mcp_dir.stat.exists | default(false)
  become: true
  block:
    - name: deploy | Install certificate to MCP server
      ansible.builtin.command: >-
        install -o {{ letsencrypt_aap_user }} -g {{ letsencrypt_aap_user }}
        -m {{ item.mode }}
        {{ item.src }} {{ item.dest }}
      loop:
        - src: "{{ letsencrypt_cert_dir }}/{{ letsencrypt_domain }}/fullchain.pem"
          dest: "/home/{{ letsencrypt_aap_user }}/aap/mcp/etc/mcp.cert"
          mode: "0644"
        - src: "{{ letsencrypt_cert_dir }}/{{ letsencrypt_domain }}/privkey.pem"
          dest: "/home/{{ letsencrypt_aap_user }}/aap/mcp/etc/mcp.key"
          mode: "0600"
      changed_when: true

    - name: deploy | Restart MCP server
      ansible.builtin.command: >-
        runuser -l {{ letsencrypt_aap_user }}
        -c 'XDG_RUNTIME_DIR=/run/user/$(id -u) systemctl --user restart mcp'
      changed_when: true

- name: deploy | Wait for gateway to start serving HTTPS
  ansible.builtin.wait_for:
    port: 443
    delay: 5
    timeout: 30
  when: __letsencrypt_gateway_dir.stat.exists | default(false)

- name: deploy | Verify gateway certificate - fetch served certificate
  community.crypto.get_certificate:
    host: localhost
    port: 443
    server_name: "{{ letsencrypt_domain }}"
  register: __letsencrypt_gateway_fetched_cert
  when: __letsencrypt_gateway_dir.stat.exists | default(false)

- name: deploy | Verify gateway certificate - parse certificate info
  community.crypto.x509_certificate_info:
    content: "{{ __letsencrypt_gateway_fetched_cert.cert }}"
  register: __letsencrypt_gateway_cert
  when: __letsencrypt_gateway_dir.stat.exists | default(false)

- name: deploy | Verify gateway certificate - fail if domain does not match
  ansible.builtin.fail:
    msg: >-
      Gateway is not serving the expected certificate for {{ letsencrypt_domain }}.
      Served subject alt names: {{ __letsencrypt_gateway_cert.subject_alt_name }}
  when:
    - __letsencrypt_gateway_dir.stat.exists | default(false)
    - "'DNS:' + letsencrypt_domain not in __letsencrypt_gateway_cert.subject_alt_name"

- name: deploy | Display deployment result
  ansible.builtin.debug:
    msg:
      - "Certificates deployed to AAP services"
      - "Gateway: {{ 'deployed and verified' if __letsencrypt_gateway_dir.stat.exists | default(false) else 'not found, skipped' }}"
      - "MCP: {{ 'deployed' if (__letsencrypt_mcp_dir.stat.exists | default(false)) else 'not found or disabled, skipped' }}"
    verbosity: 1
