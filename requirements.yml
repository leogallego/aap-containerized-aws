---
# Ansible Collections Requirements for AAP Containerized Deployment on AWS

collections:
  # AWS Collection - for EC2, VPC, security groups, etc.
  - name: amazon.aws

  # AAP Utilities - for containerized service management, cert handling
  - name: infra.aap_utilities

  # Crypto Collection - for ACME certificate provisioning (acme provider)
  - name: community.crypto
